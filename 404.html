<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Ashton Chen</title>
        <!--
            GitHub Pages SPA fallback.
            Encodes the requested path into a query string and redirects to the
            app root, where the decode snippet in index.html restores the URL so
            React Router can handle it. pathSegmentsToKeep = 0 because the site is
            served from the domain root (custom domain ashyxchen.io).
        -->
        <script type="text/javascript">
            (function() {
                var pathSegmentsToKeep = 0;
                var l = window.location;
                l.replace(
                    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                    l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
                    l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
                    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                    l.hash
                );
            }());
        </script>
    </head>
    <body></body>
</html>
